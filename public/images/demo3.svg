<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a0f"/>
      <stop offset="100%" style="stop-color:#12121a"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ff3366"/>
      <stop offset="100%" style="stop-color:#00d4ff"/>
    </linearGradient>
  </defs>
  <rect width="800" height="450" fill="url(#bg)"/>
  <!-- Header -->
  <rect x="0" y="0" width="800" height="50" fill="#12121a"/>
  <rect x="20" y="12" width="30" height="26" rx="4" fill="url(#accent)"/>
  <text x="60" y="33" fill="#f0f0f5" font-family="Arial Black" font-size="16">AMKYAWDEV RECAP</text>
  <!-- Export Button (highlighted) -->
  <rect x="620" y="10" width="90" height="30" rx="6" fill="url(#accent)"/>
  <text x="635" y="30" fill="white" font-size="11">Export ↓</text>
  <!-- Main Content -->
  <rect x="0" y="50" width="800" height="400" fill="#0a0a0f"/>
  <!-- Export Settings Panel -->
  <rect x="200" y="70" width="400" height="320" rx="16" fill="#12121a" stroke="#2a2a3a"/>
  <text x="220" y="100" fill="#f0f0f5" font-family="Arial Black" font-size="14">Export Video</text>
  <!-- Resolution -->
  <text x="220" y="130" fill="#8888a0" font-size="10">Resolution</text>
  <rect x="220" y="140" width="160" height="35" rx="6" fill="#1a1a24" stroke="#ff3366"/>
  <text x="235" y="163" fill="#f0f0f5" font-size="11">1080p (Full HD)</text>
  <!-- Quality -->
  <text x="420" y="130" fill="#8888a0" font-size="10">Quality</text>
  <rect x="420" y="140" width="160" height="35" rx="6" fill="#1a1a24"/>
  <text x="435" y="163" fill="#f0f0f5" font-size="11">High</text>
  <!-- Format -->
  <text x="220" y="195" fill="#8888a0" font-size="10">Format</text>
  <rect x="220" y="205" width="160" height="35" rx="6" fill="#1a1a24"/>
  <text x="235" y="228" fill="#f0f0f5" font-size="11">MP4 (H.264)</text>
  <!-- Options -->
  <rect x="220" y="260" width="360" height="40" rx="6" fill="#1a1a24"/>
  <rect x="230" y="273" width="18" height="18" rx="2" fill="#ff3366"/>
  <text x="255" y="286" fill="#f0f0f5" font-size="11">Include Subtitles</text>
  <rect x="420" y="260" width="360" height="40" rx="6" fill="#1a1a24"/>
  <rect x="430" y="273" width="18" height="18" rx="2" fill="#ff3366"/>
  <text x="455" y="286" fill="#f0f0f5" font-size="11">Include Voiceover</text>
  <!-- Export Button -->
  <rect x="220" y="320" width="360" height="50" rx="8" fill="url(#accent)"/>
  <text x="370" y="352" fill="white" font-family="Arial Black" font-size="14" text-anchor="middle">EXPORT VIDEO</text>
  <!-- Side effects -->
  <circle cx="400" cy="220" r="100" fill="none" stroke="#ff3366" stroke-width="1" stroke-dasharray="5,5" opacity="0.3"/>
  <circle cx="400" cy="220" r="150" fill="none" stroke="#00d4ff" stroke-width="1" stroke-dasharray="3,3" opacity="0.2"/>
  <!-- Footer -->
  <rect x="0" y="400" width="800" height="50" fill="#12121a"/>
  <circle cx="20" cy="425" r="4" fill="#00ff88"/>
  <text x="30" y="428" fill="#8888a0" font-size="9">Ready</text>
</svg>
