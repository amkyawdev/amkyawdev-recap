<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ff3366"/>
      <stop offset="50%" style="stop-color:#ff6699"/>
      <stop offset="100%" style="stop-color:#00d4ff"/>
    </linearGradient>
    <linearGradient id="grad2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00d4ff"/>
      <stop offset="100%" style="stop-color:#0099cc"/>
    </linearGradient>
  </defs>
  <!-- Background Circle -->
  <circle cx="32" cy="32" r="30" fill="#0a0a0f" stroke="url(#grad1)" stroke-width="2"/>
  <!-- Film Reel Outer -->
  <circle cx="32" cy="32" r="24" fill="none" stroke="url(#grad1)" stroke-width="3"/>
  <!-- Film Holes -->
  <circle cx="32" cy="12" r="4" fill="#0a0a0f" stroke="url(#grad1)" stroke-width="1.5"/>
  <circle cx="32" cy="52" r="4" fill="#0a0a0f" stroke="url(#grad1)" stroke-width="1.5"/>
  <circle cx="12" cy="32" r="4" fill="#0a0a0f" stroke="url(#grad1)" stroke-width="1.5"/>
  <circle cx="52" cy="32" r="4" fill="#0a0a0f" stroke="url(#grad1)" stroke-width="1.5"/>
  <!-- Center Play Button -->
  <circle cx="32" cy="32" r="12" fill="url(#grad1)"/>
  <polygon points="28,24 28,40 44,32" fill="#0a0a0f"/>
  <!-- Sparkle Effects -->
  <circle cx="50" cy="14" r="2" fill="#ffd700" opacity="0.8"/>
  <circle cx="14" cy="50" r="1.5" fill="#00d4ff" opacity="0.8"/>
  <circle cx="54" cy="48" r="1" fill="#ff3366" opacity="0.6"/>
</svg>
